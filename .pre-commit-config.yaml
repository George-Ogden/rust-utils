default_stages: [pre-commit]
default_install_hook_types:
  [pre-commit, prepare-commit-msg, commit-msg, post-commit, pre-push]

ci:
  skip:
    - mirror-check
    - no-commit-to-branch
    - fmt
    - cargo-check
    - clippy

repos:
  - repo: https://github.com/George-Ogden/mirror-rorrim/
    rev: v0.4.9
    hooks:
      - id: mirror-check
        fail_fast: true

  - repo: builtin
    hooks:
      - id: no-commit-to-branch
        fail_fast: true
      - id: end-of-file-fixer
        stages: [pre-commit]
        exclude: .rs$
      - id: mixed-line-ending
        stages: [pre-commit]
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: check-added-large-files
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]
        args: [--assume-in-merge]

  - repo: https://github.com/koalaman/shellcheck-precommit/
    rev: v0.11.0
    hooks:
      - id: shellcheck
        args: [--severity=warning]

  - repo: https://github.com/pre-commit/mirrors-prettier/
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        exclude: .snap$

  - repo: https://github.com/rhysd/actionlint/
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/codespell-project/codespell/
    rev: v2.4.2
    hooks:
      - id: codespell

  - repo: https://github.com/semgrep/pre-commit/
    rev: v1.164.0
    hooks:
      - id: semgrep
        require_serial: true
        args:
          [
            --config,
            .semgrep-rules/rust.yaml,
            --autofix,
            --quiet,
            --error,
            --skip-unknown-extensions,
            --disable-version-check,
          ]

  - repo: https://github.com/bnjbvr/cargo-machete/
    rev: v0.9.2
    hooks:
      - id: cargo-machete
        args: [--with-metadata, --fix]

  - repo: https://github.com/FeryET/pre-commit-rust/
    rev: v1.2.1
    hooks:
      - id: clippy
        stages: [pre-commit]
        name: clippy fix
        args:
          [
            --fix,
            --allow-staged,
            --allow-dirty,
            --all-targets,
            --all-features,
            --,
            -A,
            unused_variables,
          ]
      - id: fmt
        stages: [pre-commit]
      - id: cargo-check
        stages: [pre-commit]
      - id: clippy
        stages: [pre-commit]
        name: clippy check
        args: [--all-features, --, -D, warnings, -W, clippy::pedantic]
      - id: clippy
        stages: [pre-commit]
        name: clippy all
        args: [--all-features, --all-targets, --, -D, warnings]

  - repo: https://github.com/George-Ogden/pre-commit-hooks/
    rev: v4.0.0
    hooks:
      - id: dbg-check
      - id: todo-check
        exclude: (?x)^(
          .pre-commit-config.yaml|
          .gitignore
          )$
      - id: spell-check-commit-msgs
      - id: mirror-auto-msg
      - id: version-txt-auto-msg
